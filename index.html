<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #F0E98A; --dark: #3D3C3A; --dark2: #2C2C2A;
    --mid: #5F5E5A; --muted: #888780; --border: #D3D1C7;
    --bg: #F2F0EA; --bgcard: #FAFAF7; --white: #ffffff;
    --red: #791F1F; --redbg: #FCEBEB; --redborder: #F09595;
    --green: #3B6D11; --amber: #7A5C00; --amberbg: #FFF8E1; --amberborder: #F0D080;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--dark); min-height: 100vh; }

  /* HEADER */
  header { background: var(--dark); padding: 0 40px; height: 64px; display: flex; align-items: center; gap: 18px; }
  .logo-diamond { width: 36px; height: 36px; background: var(--gold); transform: rotate(45deg); border-radius: 5px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .logo-diamond span { transform: rotate(-45deg); font-family: 'Cormorant Garamond', serif; font-size: 14px; font-weight: 600; color: var(--dark); }
  .header-text h1 { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 500; color: var(--gold); letter-spacing: 0.3px; }
  .header-text p { font-size: 10px; color: #9A9890; letter-spacing: 1.8px; text-transform: uppercase; margin-top: 1px; }

  /* MAIN */
  .main { max-width: 900px; margin: 0 auto; padding: 36px 24px; }
  .section-label { font-size: 10px; letter-spacing: 1.8px; text-transform: uppercase; color: var(--muted); font-weight: 500; margin-bottom: 10px; }

  /* MODE SELECTOR */
  .mode-selector { display: flex; gap: 10px; margin-bottom: 24px; }
  .mode-btn {
    flex: 1; padding: 16px 20px; border: 0.5px solid var(--border); border-radius: 10px;
    background: var(--white); cursor: pointer; text-align: left;
    transition: all 0.2s; font-family: 'DM Sans', sans-serif;
    display: flex; align-items: center; gap: 14px;
  }
  .mode-btn:hover { border-color: var(--mid); }
  .mode-btn.active { background: var(--dark); border-color: var(--dark); }
  .mode-icon {
    width: 34px; height: 34px; border-radius: 7px; display: flex; align-items: center;
    justify-content: center; flex-shrink: 0; font-size: 16px;
    background: var(--bg); transition: background 0.2s;
  }
  .mode-btn.active .mode-icon { background: rgba(240,233,138,0.15); }
  .mode-info { display: flex; flex-direction: column; gap: 2px; }
  .mode-name { font-size: 13px; font-weight: 500; color: var(--dark); transition: color 0.2s; }
  .mode-btn.active .mode-name { color: var(--gold); }
  .mode-desc { font-size: 11px; color: var(--muted); transition: color 0.2s; }
  .mode-btn.active .mode-desc { color: #9A9890; }

  /* INPUT CARD */
  .input-card { background: var(--white); border: 0.5px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 16px; }
  .input-label { font-size: 10px; letter-spacing: 1.8px; text-transform: uppercase; color: var(--muted); font-weight: 500; margin-bottom: 10px; }
  textarea {
    width: 100%; min-height: 200px; border: 0.5px solid var(--border); border-radius: 8px;
    padding: 14px 16px; font-family: 'DM Sans', sans-serif; font-size: 13px;
    color: var(--dark); line-height: 1.7; resize: vertical; background: var(--bgcard);
    outline: none; transition: border-color 0.2s;
  }
  textarea:focus { border-color: var(--dark); background: var(--white); }
  textarea::placeholder { color: var(--border); }
  .actions { display: flex; align-items: center; gap: 14px; margin-top: 16px; }
  .btn-generate {
    background: var(--dark); color: var(--gold); border: none; border-radius: 8px;
    padding: 13px 32px; font-family: 'DM Sans', sans-serif; font-size: 13px;
    font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 10px;
    transition: background 0.2s, transform 0.1s;
  }
  .btn-generate:hover { background: var(--dark2); }
  .btn-generate:active { transform: scale(0.98); }
  .btn-generate:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; transform: none; }
  .spinner { width: 15px; height: 15px; border: 2px solid rgba(240,233,138,0.25); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.75s linear infinite; display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .hint { font-size: 12px; color: var(--muted); }
  .error-box {
    background: var(--redbg); border: 0.5px solid var(--redborder); border-radius: 8px;
    padding: 13px 16px; font-size: 13px; color: var(--red); margin-top: 16px;
    display: none; line-height: 1.6;
  }

  /* WEBHOOK NOTICE */
  .webhook-notice {
    background: var(--amberbg); border: 0.5px solid var(--amberborder); border-radius: 8px;
    padding: 10px 14px; font-size: 12px; color: var(--amber); margin-bottom: 16px;
    display: none; line-height: 1.6; align-items: flex-start; gap: 8px;
  }
  .webhook-notice.visible { display: flex; }

  /* OUTPUT */
  .output-section { display: none; margin-top: 32px; }
  .output-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .output-title { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 500; color: var(--dark); }
  .output-badge { background: var(--gold); color: var(--dark); font-size: 10px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; padding: 3px 10px; border-radius: 4px; }
  .output-mode-tag { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-left: 10px; }

  /* TABS */
  .tabs { display: flex; border-bottom: 0.5px solid var(--border); }
  .tab {
    padding: 11px 24px; font-size: 11px; letter-spacing: 1.2px; text-transform: uppercase;
    font-weight: 500; color: var(--muted); cursor: pointer;
    border-bottom: 2px solid transparent; margin-bottom: -0.5px;
    transition: color 0.2s, border-color 0.2s; user-select: none;
  }
  .tab:hover:not(.active) { color: var(--mid); }
  .tab.active { color: var(--dark); border-bottom-color: var(--dark); }
  .tab-badge { display: inline-block; background: var(--gold); color: var(--dark); font-size: 9px; font-weight: 500; padding: 1px 6px; border-radius: 3px; margin-left: 6px; vertical-align: middle; }
  .panel { background: var(--white); border: 0.5px solid var(--border); border-top: none; border-radius: 0 0 10px 10px; padding: 24px; display: none; }
  .panel.active { display: block; }
  .content-block { font-size: 13px; color: var(--dark); line-height: 1.85; white-space: pre-wrap; word-break: break-word; }

  /* MAIL BLOCKS */
  .mail-block { border: 0.5px solid var(--border); border-radius: 8px; margin-bottom: 16px; overflow: hidden; transition: border-color 0.2s; }
  .mail-block.selected { border-color: var(--dark); }
  .mail-block-header { background: var(--bgcard); border-bottom: 0.5px solid var(--border); padding: 10px 16px; display: flex; align-items: center; gap: 10px; }
  .mail-block.selected .mail-block-header { background: var(--dark); }
  .mail-block.selected .mail-meta-service { color: var(--gold); }
  .mail-block.selected .mail-meta-dest { color: #9A9890; }
  .mail-checkbox { width: 16px; height: 16px; accent-color: var(--dark); cursor: pointer; flex-shrink: 0; }
  .mail-number { width: 22px; height: 22px; background: var(--dark); color: var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 500; flex-shrink: 0; }
  .mail-block.selected .mail-number { background: var(--gold); color: var(--dark); }
  .mail-meta { flex: 1; }
  .mail-meta-service { font-size: 12px; font-weight: 500; color: var(--dark); }
  .mail-meta-dest { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .mail-body { padding: 16px; font-size: 13px; color: var(--dark); line-height: 1.85; white-space: pre-wrap; word-break: break-word; }

  /* REGROUPER */
  .merge-bar { display: none; background: var(--dark); border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; align-items: center; justify-content: space-between; gap: 12px; }
  .merge-bar.visible { display: flex; }
  .merge-bar-text { font-size: 12px; color: #9A9890; }
  .merge-bar-text strong { color: var(--gold); }
  .btn-merge { background: var(--gold); color: var(--dark); border: none; border-radius: 6px; padding: 8px 18px; font-size: 11px; font-weight: 500; letter-spacing: 0.8px; text-transform: uppercase; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: opacity 0.2s; }
  .btn-merge:hover { opacity: 0.85; }
  .btn-merge:disabled { opacity: 0.4; cursor: not-allowed; }
  .merge-spinner { width: 13px; height: 13px; border: 2px solid rgba(61,60,58,0.2); border-top-color: var(--dark); border-radius: 50%; animation: spin 0.75s linear infinite; display: none; }

  /* PANEL FOOTER */
  .panel-footer { display: flex; align-items: center; gap: 12px; margin-top: 20px; padding-top: 16px; border-top: 0.5px solid var(--border); }
  .btn-copy { background: transparent; border: 0.5px solid var(--border); border-radius: 6px; padding: 7px 18px; font-size: 11px; letter-spacing: 0.8px; text-transform: uppercase; color: var(--muted); cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s; }
  .btn-copy:hover { border-color: var(--dark); color: var(--dark); }
  .btn-copy.copied { border-color: var(--green); color: var(--green); }
  .btn-reset { background: transparent; border: none; font-size: 11px; letter-spacing: 0.8px; text-transform: uppercase; color: var(--muted); cursor: pointer; font-family: 'DM Sans', sans-serif; padding: 7px 0; transition: color 0.2s; }
  .btn-reset:hover { color: var(--dark); }

  /* QUOTES specific — alert email tab */
  .alert-tag { display: inline-block; background: var(--amberbg); border: 0.5px solid var(--amberborder); color: var(--amber); font-size: 9px; font-weight: 500; padding: 1px 7px; border-radius: 3px; margin-left: 6px; vertical-align: middle; text-transform: uppercase; letter-spacing: 0.8px; }
</style>
</head>

let selectedMails = new Set();

// ─── MODE SWITCHING ───────────────────────────────────────────────────────────

function setMode(mode) {
  currentMode = mode;
  document.getElementById('mode-kensington').classList.toggle('active', mode === 'kensington');
  document.getElementById('mode-quotes').classList.toggle('active', mode === 'quotes');

  const inputLabel = document.getElementById('input-label');
  const textarea = document.getElementById('main-input');
  const btnLabel = document.getElementById('btn-label');
  const notice = document.getElementById('webhook-notice');
  const noticeText = document.getElementById('webhook-notice-text');

  if (mode === 'kensington') {
    inputLabel.textContent = 'Contenu du TMT Kensington';
    textarea.placeholder = 'Coller ici le texte copié depuis le TMT Kensington (tous les jours du séjour France)...';
    btnLabel.textContent = 'Générer la fiche et les mails';
    if (WEBHOOKS.kensington.includes('make.com') && !WEBHOOKS.kensington.includes('ICI')) {
      notice.classList.remove('visible');
    } else {
      noticeText.textContent = 'Webhook Kensington non configuré. Remplacer KENSINGTON_WEBHOOK_URL_ICI dans le code.';
      notice.classList.add('visible');
    }
  } else {
    inputLabel.textContent = 'Brief client (Quotes)';
    textarea.placeholder = 'Coller ici le brief reçu (Kensington, autre agence, client direct). Anglais ou français accepté...';
    btnLabel.textContent = "Générer l'itinéraire";
    if (WEBHOOKS.quotes.includes('ICI')) {
      noticeText.textContent = "Webhook Quotes non encore configuré. Créer le scénario Make correspondant et remplacer QUOTES_WEBHOOK_URL_ICI dans le code.";
      notice.classList.add('visible');
    } else {
      notice.classList.remove('visible');
    }
  }

  reset(false);
}

// ─── TAB SWITCHING ────────────────────────────────────────────────────────────

function switchTabKT(tab) {
  ['fiche','mails'].forEach(t => {
    document.getElementById('tab-' + t).classList.toggle('active', t === tab);
    document.getElementById('panel-' + t).classList.toggle('active', t === tab);
  });
}

function switchTabQT(tab) {
  ['interne','client','email'].forEach(t => {
    document.getElementById('qtab-' + t).classList.toggle('active', t === tab);
    document.getElementById('qpanel-' + t).classList.toggle('active', t === tab);
  });
}

// ─── GENERATE ─────────────────────────────────────────────────────────────────

      return;

    fullText = parsed.text;
  }
} catch(e) {

}

    if (!fullText || fullText.length < 50) {
      showError('Réponse vide. Vérifiez que le scénario Make est actif et que la connexion Anthropic est configurée.');
      return;

    if (currentMode === 'kensington') {

// ─── RENDER KENSINGTON ────────────────────────────────────────────────────────

function renderKensington(fullText) {
  document.getElementById('kt-tabs-wrapper').style.display = 'block';
  document.getElementById('qt-tabs-wrapper').style.display = 'none';
  document.getElementById('output-mode-tag').textContent = 'Kensington TMT';

  const marker = '===OUTPUT2===';
  const idx = fullText.indexOf(marker);
  const ficheText = idx !== -1 ? fullText.substring(0, idx).trim() : fullText.trim();
  mailsRaw = idx !== -1 ? fullText.substring(idx + marker.length).trim() : '';

  document.getElementById('fiche-content').textContent = ficheText;

  const refMatch = ficheText.match(/Référence KT\s*:\s*([^\n]+)/);
  if (refMatch) document.getElementById('ref-badge').textContent = refMatch[1].trim();

  const mailsContainer = document.getElementById('mails-content');
  mailsContainer.innerHTML = '';
  mailBlocks = [];
  let mailCount = 0;

  if (mailsRaw) {
    const blocks = mailsRaw.split('---MAIL---').map(b => b.trim()).filter(b => b.length > 10);
    mailCount = blocks.length;
    blocks.forEach((block, i) => {
      const lines = block.split('\n');
      let service = '', jour = '', dest = '', bodyLines = [];
      let inBody = false;
      lines.forEach(l => {
        if (!inBody) {
          if (l.startsWith('SERVICE :')) service = l.replace('SERVICE :', '').trim();
          else if (l.startsWith('JOUR :')) jour = l.replace('JOUR :', '').trim();
          else if (l.startsWith('DESTINATAIRE :')) { dest = l.replace('DESTINATAIRE :', '').trim(); inBody = true; }
        } else { bodyLines.push(l); }
      });
      const body = bodyLines.join('\n').trim();
      mailBlocks.push({ service, jour, dest, body, raw: block });

      const div = document.createElement('div');
      div.className = 'mail-block';
      div.dataset.idx = i;
      div.innerHTML = `<div class="mail-block-header">
        <input type="checkbox" class="mail-checkbox" onchange="toggleMailSelect(${i})" title="Sélectionner pour regrouper">
        <div class="mail-number">${i+1}</div>
        <div class="mail-meta">
          <div class="mail-meta-service">${service || 'Service ' + (i+1)}</div>
          <div class="mail-meta-dest">${jour}${dest ? ' · ' + dest : ''}</div>
        </div>
      </div><div class="mail-body">${escHtml(body)}</div>`;
      mailsContainer.appendChild(div);
    });
  } else {
    mailsContainer.innerHTML = '<p style="font-size:13px;color:#888780;padding:8px 0;">Aucun mail à générer pour ce dossier.</p>';
  }

  document.getElementById('mail-count').textContent = mailCount;
  document.getElementById('merge-bar').classList.remove('visible');
  switchTabKT('fiche');
}

// ─── RENDER QUOTES ────────────────────────────────────────────────────────────

function renderQuotes(fullText) {
  document.getElementById('kt-tabs-wrapper').style.display = 'none';
  document.getElementById('qt-tabs-wrapper').style.display = 'block';
  document.getElementById('output-mode-tag').textContent = 'Quote FIT';

  const extract = (start, end) => {
    const s = fullText.indexOf(start);
    const e = fullText.indexOf(end);
    if (s === -1 || e === -1) return '';
    return fullText.substring(s + start.length, e).trim();
  };

  const output0 = extract('===OUTPUT0_START===', '===OUTPUT0_END===');
  const output1 = extract('===OUTPUT1_START===', '===OUTPUT1_END===');
  const output2 = extract('===OUTPUT2_START===', '===OUTPUT2_END===');

  // Si brief insuffisant : pas d'itinéraire, seulement l'email
  const briefInsuffisant = output0 && (!output1 && !output2);

  document.getElementById('quote-interne-content').textContent = output1 || '(Aucune fiche interne générée — le brief était insuffisant. Voir l\'onglet "Email questions".)';
  document.getElementById('quote-client-content').textContent = output2 || '(Aucun programme client généré — le brief était insuffisant. Voir l\'onglet "Email questions".)';
  document.getElementById('quote-email-content').textContent = output0 || '(Aucun email de questions — le brief était suffisant pour générer un itinéraire.)';

  // Badge alerte sur onglet email si brief insuffisant
  const alertTag = document.getElementById('email-alert-tag');
  alertTag.style.display = briefInsuffisant ? 'inline-block' : 'none';

  // Référence depuis la fiche interne
  if (output1) {
    const refMatch = output1.match(/Client final\s*:\s*([^\n]+)/);
    if (refMatch) document.getElementById('ref-badge').textContent = refMatch[1].trim();
  }

  // Activer le bon onglet par défaut
  if (briefInsuffisant) {
    switchTabQT('email');
  } else {
    switchTabQT('interne');
  }
}

// ─── UTILS ────────────────────────────────────────────────────────────────────

function toggleMailSelect(idx) {
  const block = document.querySelector(`.mail-block[data-idx="${idx}"]`);
  if (selectedMails.has(idx)) {
    selectedMails.delete(idx);
    block.classList.remove('selected');
  } else {
    selectedMails.add(idx);
    block.classList.add('selected');
  }
  const bar = document.getElementById('merge-bar');
  const count = document.getElementById('merge-count');
  count.textContent = selectedMails.size;
  if (selectedMails.size >= 2) {
    bar.classList.add('visible');
  } else {
    bar.classList.remove('visible');
  }
}

async function mergeMails() {
  if (selectedMails.size < 2) return;

  const btn = document.getElementById('btn-merge');
  const spinner = document.getElementById('merge-spinner');
  btn.disabled = true;
  spinner.style.display = 'block';

  const selected = Array.from(selectedMails).sort((a,b) => a-b);
  const selectedData = selected.map(i => mailBlocks[i]);

  const servicesListe = selectedData.map((m, i) => `PRESTATION ${i+1}\nService : ${m.service}\nJour : ${m.jour}\nDestinataire : ${m.dest}\n\n${m.body}`).join('\n\n---\n\n');

  const instruction = `Tu es un assistant opérationnel pour Liberty Incentives & Congresses France.

Regroupe les mails prestataires suivants en un seul mail adressé au même prestataire.
Le mail fusionné doit :
- Avoir pour objet : Demande de disponibilité — Plusieurs prestations — Réf. [reprendre la référence si visible]
- Mentionner "les services suivants" dans l'introduction
- Présenter chaque prestation dans une section numérotée PRESTATION 1, PRESTATION 2, etc.
- Conclure par : Merci pour votre retour.
- Garder la signature Liberty standard

Voici les mails à fusionner :

${servicesListe}

Réponds uniquement avec le mail fusionné, sans commentaire.`;

  try {
    const res = await fetch(WEBHOOKS.kensington, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: instruction
    });

    if (!res.ok) { showError('Erreur lors du regroupement : ' + res.status); return; }

    const rawText = await res.text();
    let mergedText = rawText;
    try {
      const parsed = JSON.parse(rawText);
      if (Array.isArray(parsed)) mergedText = parsed.map(b => b.text || '').join('');
      else if (parsed && parsed.text) mergedText = parsed.text;
    } catch(e) { mergedText = rawText; }

    // Remplacer les mails sélectionnés par le mail fusionné
    const mailsContainer = document.getElementById('mails-content');
    const allBlocks = mailsContainer.querySelectorAll('.mail-block');

    // Supprimer les blocs sélectionnés sauf le premier
    const sortedSelected = Array.from(selectedMails).sort((a,b) => a-b);
    const firstIdx = sortedSelected[0];

    sortedSelected.forEach((idx, pos) => {
      if (pos > 0) {
        const el = mailsContainer.querySelector(`.mail-block[data-idx="${idx}"]`);
        if (el) el.remove();
      }
    });

    // Remplacer le premier par le mail fusionné
    const firstEl = mailsContainer.querySelector(`.mail-block[data-idx="${firstIdx}"]`);
    if (firstEl) {
      const serviceLabel = selectedData.map(m => m.service).join(' + ');
      firstEl.className = 'mail-block';
      firstEl.innerHTML = `<div class="mail-block-header">
        <div class="mail-number">✓</div>
        <div class="mail-meta">
          <div class="mail-meta-service">${serviceLabel}</div>
          <div class="mail-meta-dest">Mail regroupé · ${selectedData.length} prestations</div>
        </div>
      </div><div class="mail-body">${escHtml(mergedText)}</div>`;
    }

    // Reset sélection
    selectedMails.clear();
    document.getElementById('merge-bar').classList.remove('visible');

    // Renuméroter
    mailsContainer.querySelectorAll('.mail-block').forEach((el, i) => {
      const num = el.querySelector('.mail-number');
      if (num && num.textContent !== '✓') num.textContent = i + 1;
    });
    document.getElementById('mail-count').textContent = mailsContainer.querySelectorAll('.mail-block').length;

  } catch(e) {
    showError('Erreur réseau lors du regroupement : ' + e.message);
  } finally {
    btn.disabled = false;
    spinner.style.display = 'none';
  }
}

function escHtml(str) {
  return str
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
}

function showError(msg) {
  const box = document.getElementById('error-box');
  box.textContent = msg;
  box.style.display = 'block';
}

function copyContent(contentId, btnId, defaultLabel) {
  const text = document.getElementById(contentId).textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById(btnId);
    btn.textContent = 'Copié';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = defaultLabel; btn.classList.remove('copied'); }, 2000);
  });
}

function copyRawText(varName, btnId, defaultLabel) {
  const text = varName === 'mailsRaw' ? mailsRaw : '';
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById(btnId);
    btn.textContent = 'Copié';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = defaultLabel; btn.classList.remove('copied'); }, 2000);
  });
}

function reset(clearInput = true) {
  if (clearInput) document.getElementById('main-input').value = '';
  document.getElementById('output-section').style.display = 'none';
  document.getElementById('error-box').style.display = 'none';
  mailsRaw = '';
  mailBlocks = [];
  selectedMails.clear();
  document.getElementById('merge-bar').classList.remove('visible');
  switchTabKT('fiche');
  switchTabQT('interne');
  if (clearInput) window.scrollTo(0, 0);
}

// Init notice check
setMode('kensington');
</script>
