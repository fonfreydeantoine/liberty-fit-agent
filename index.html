<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liberty FIT — Agent Kensington</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #F0E98A; --dark: #3D3C3A; --dark2: #2C2C2A;
    --mid: #5F5E5A; --muted: #888780; --border: #D3D1C7;
    --bg: #F2F0EA; --bgcard: #FAFAF7; --white: #ffffff;
    --red: #791F1F; --redbg: #FCEBEB; --redborder: #F09595;
    --green: #3B6D11;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--dark); min-height: 100vh; }
  header { background: var(--dark); padding: 0 40px; height: 64px; display: flex; align-items: center; gap: 18px; }
  .logo-diamond { width: 36px; height: 36px; background: var(--gold); transform: rotate(45deg); border-radius: 5px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .logo-diamond span { transform: rotate(-45deg); font-family: 'Cormorant Garamond', serif; font-size: 14px; font-weight: 600; color: var(--dark); }
  .header-text h1 { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 500; color: var(--gold); letter-spacing: 0.3px; }
  .header-text p { font-size: 10px; color: #9A9890; letter-spacing: 1.8px; text-transform: uppercase; margin-top: 1px; }
  .main { max-width: 900px; margin: 0 auto; padding: 36px 24px; }
  .section-label { font-size: 10px; letter-spacing: 1.8px; text-transform: uppercase; color: var(--muted); font-weight: 500; margin-bottom: 10px; }
  .input-card { background: var(--white); border: 0.5px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 16px; }
  textarea { width: 100%; min-height: 200px; border: 0.5px solid var(--border); border-radius: 8px; padding: 14px 16px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--dark); line-height: 1.7; resize: vertical; background: var(--bgcard); outline: none; transition: border-color 0.2s; }
  textarea:focus { border-color: var(--dark); background: var(--white); }
  textarea::placeholder { color: var(--border); }
  .actions { display: flex; align-items: center; gap: 14px; margin-top: 16px; }
  .btn-generate { background: var(--dark); color: var(--gold); border: none; border-radius: 8px; padding: 13px 32px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: background 0.2s, transform 0.1s; }
  .btn-generate:hover { background: var(--dark2); }
  .btn-generate:active { transform: scale(0.98); }
  .btn-generate:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; transform: none; }
  .spinner { width: 15px; height: 15px; border: 2px solid rgba(240,233,138,0.25); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.75s linear infinite; display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .hint { font-size: 12px; color: var(--muted); }
  .error-box { background: var(--redbg); border: 0.5px solid var(--redborder); border-radius: 8px; padding: 13px 16px; font-size: 13px; color: var(--red); margin-top: 16px; display: none; line-height: 1.6; }
  .output-section { display: none; margin-top: 32px; }
  .output-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .output-title { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 500; color: var(--dark); }
  .output-badge { background: var(--gold); color: var(--dark); font-size: 10px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; padding: 3px 10px; border-radius: 4px; }
  .tabs { display: flex; border-bottom: 0.5px solid var(--border); }
  .tab { padding: 11px 24px; font-size: 11px; letter-spacing: 1.2px; text-transform: uppercase; font-weight: 500; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -0.5px; transition: color 0.2s, border-color 0.2s; user-select: none; }
  .tab:hover:not(.active) { color: var(--mid); }
  .tab.active { color: var(--dark); border-bottom-color: var(--dark); }
  .tab-badge { display: inline-block; background: var(--gold); color: var(--dark); font-size: 9px; font-weight: 500; padding: 1px 6px; border-radius: 3px; margin-left: 6px; vertical-align: middle; }
  .panel { background: var(--white); border: 0.5px solid var(--border); border-top: none; border-radius: 0 0 10px 10px; padding: 24px; display: none; }
  .panel.active { display: block; }
  .content-block { font-size: 13px; color: var(--dark); line-height: 1.85; white-space: pre-wrap; word-break: break-word; }
  .mail-block { border: 0.5px solid var(--border); border-radius: 8px; margin-bottom: 16px; overflow: hidden; }
  .mail-block-header { background: var(--bgcard); border-bottom: 0.5px solid var(--border); padding: 10px 16px; display: flex; align-items: center; gap: 10px; }
  .mail-number { width: 22px; height: 22px; background: var(--dark); color: var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 500; flex-shrink: 0; }
  .mail-meta { flex: 1; }
  .mail-meta-service { font-size: 12px; font-weight: 500; color: var(--dark); }
  .mail-meta-dest { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .mail-body { padding: 16px; font-size: 13px; color: var(--dark); line-height: 1.85; white-space: pre-wrap; word-break: break-word; }
  .panel-footer { display: flex; align-items: center; gap: 12px; margin-top: 20px; padding-top: 16px; border-top: 0.5px solid var(--border); }
  .btn-copy { background: transparent; border: 0.5px solid var(--border); border-radius: 6px; padding: 7px 18px; font-size: 11px; letter-spacing: 0.8px; text-transform: uppercase; color: var(--muted); cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s; }
  .btn-copy:hover { border-color: var(--dark); color: var(--dark); }
  .btn-copy.copied { border-color: var(--green); color: var(--green); }
  .btn-reset { background: transparent; border: none; font-size: 11px; letter-spacing: 0.8px; text-transform: uppercase; color: var(--muted); cursor: pointer; font-family: 'DM Sans', sans-serif; padding: 7px 0; transition: color 0.2s; }
  .btn-reset:hover { color: var(--dark); }
</style>
</head>
<body>

<header>
  <div class="logo-diamond"><span>L</span></div>
  <div class="header-text">
    <h1>Liberty FIT — Agent Kensington</h1>
    <p>Coordination TMT</p>
  </div>
</header>

<div class="main">
  <div class="section-label">Contenu du TMT Kensington</div>
  <div class="input-card">
    <textarea id="tmt-input" placeholder="Coller ici le texte copié depuis le TMT Kensington (tous les jours du séjour France)..."></textarea>
    <div class="actions">
      <button class="btn-generate" id="gen-btn" onclick="generate()">
        <div class="spinner" id="spinner"></div>
        <span id="btn-label">Générer la fiche et les mails</span>
      </button>
      <span class="hint" id="hint-text"></span>
    </div>
    <div class="error-box" id="error-box"></div>
  </div>

  <div class="output-section" id="output-section">
    <div class="output-header">
      <span class="output-title">Résultats</span>
      <span class="output-badge" id="ref-badge"></span>
    </div>
    <div class="tabs">
      <div class="tab active" id="tab-fiche" onclick="switchTab('fiche')">Fiche de coordination</div>
      <div class="tab" id="tab-mails" onclick="switchTab('mails')">Mails prestataires <span class="tab-badge" id="mail-count"></span></div>
    </div>
    <div class="panel active" id="panel-fiche">
      <div class="content-block" id="fiche-content"></div>
      <div class="panel-footer">
        <button class="btn-copy" id="copy-fiche" onclick="copyTab('fiche')">Copier</button>
        <button class="btn-reset" onclick="reset()">Nouveau dossier</button>
      </div>
    </div>
    <div class="panel" id="panel-mails">
      <div id="mails-content"></div>
      <div class="panel-footer">
        <button class="btn-copy" id="copy-mails" onclick="copyTab('mails')">Copier tout</button>
        <button class="btn-reset" onclick="reset()">Nouveau dossier</button>
      </div>
    </div>
  </div>
</div>

<script>
const MAKE_WEBHOOK = 'https://hook.eu1.make.com/2mp8ancoa1l53tg75x7wvea45bvbmcw8';

const SYSTEM_PROMPT = `Tu es un assistant opérationnel pour Liberty Incentives & Congresses France, DMC haut de gamme basé à Saint-Ouen (Paris). Pôle FIT (1 à 15 personnes), client principal : Kensington Tours (KT).

PÉRIMÈTRE : France uniquement. Services hors France : ignorer, signaler en début de fiche.

RÈGLES ABSOLUES :
- Ne jamais inventer d'informations. Données absentes : [DONNÉE MANQUANTE]. Ambiguës : [À VÉRIFIER].
- Ignorer les lignes [REMOVE].
- Ne jamais poser de questions. Générer toujours directement. Les ambiguïtés vont dans Points de vigilance.
- INCLUDED = Liberty contacte le prestataire, mail à générer.
- EXCLUDED = Liberty contacte ET tarifie, mail à générer.
- Aucun statut / Blank / Booked by client = [NON GÉRÉ PAR LIBERTY], pas de mail.
- Welcome Package = vendu par Liberty directement, pas de mail prestataire.
- Ne jamais mentionner INCLUDED/EXCLUDED dans les mails. Demander uniquement dispo + tarif net agence.
- Codes hôtels entre parenthèses (B, NB...) : noter tels quels, ne pas interpréter.
- Transfert départ hors France : hors périmètre même si destination France.
- Hôtel même établissement plusieurs nuits consécutives : un seul mail groupé.
- Outputs en français. Pas de tirets cadratins.

VÉRIFICATION FINALE OBLIGATOIRE : chaque service Mail à lancer OUI doit avoir un mail dans l'Output 2.

Génère exactement deux sections séparées par le marqueur ===OUTPUT2=== :
- Avant : la fiche de coordination complète
- Après : tous les mails prestataires

FORMAT FICHE :
FICHE DE COORDINATION LIBERTY — FIT / Dossier vierge
RÉFÉRENCE DOSSIER : Référence KT / Titre / Chef de projet [À ASSIGNER] / Date de création / Agent KT / Statut
Périmètre France / Hors périmètre
1. PROFIL VOYAGEUR : PAX / Composition / Vols arrivée / Vols départ / Niveau de service / Notes client
2. SERVICES JOUR PAR JOUR (France uniquement) : pour chaque jour et service : Prod Code / Durée / Horaire / PAX / Véhicule / Statut / Mail à lancer / Notes
3. POINTS DE VIGILANCE : Services EXCLUDED / Informations manquantes / Notes KT / Demandes spéciales / Délais courts
4. ACTIONS À LANCER AUJOURD'HUI : Priorité haute / Priorité normale / À faire avant [date]

FORMAT MAILS (après ===OUTPUT2===) :
Pour chaque service Mail à lancer OUI :

---MAIL---
SERVICE : [intitulé exact du service]
JOUR : [date complète]
DESTINATAIRE : [À COMPLÉTER — type de prestataire attendu]

Objet : Demande de disponibilité — [intitulé exact] — [DATE] — Réf. [REF KT]

Madame, Monsieur,

Nous vous contactons dans le cadre d'un dossier FIT pour le compte de notre client Kensington Tours.

Pourriez-vous nous confirmer votre disponibilité et votre tarif net agence pour la prestation suivante :

Prestation : [intitulé exact du TMT]
Date : [DATE]
Horaire : [HORAIRE ou À PRÉCISER]
Nombre PAX : [N]
Détail : [vendor notes pertinentes, inclusions, véhicule, langue]

Merci de nous revenir avant le [J-2 du service par défaut].

Bien cordialement,

[Prénom Nom]
Chef de projet FIT
Liberty Incentives & Congresses France
116 avenue Gabriel Péri, 93400 Saint-Ouen
france@liberty-int.com
www.liberty-int.com`;

let ficheText = '';
let mailsText = '';

function switchTab(tab) {
  ['fiche','mails'].forEach(t => {
    document.getElementById('tab-' + t).classList.toggle('active', t === tab);
    document.getElementById('panel-' + t).classList.toggle('active', t === tab);
  });
}

function reset() {
  document.getElementById('tmt-input').value = '';
  document.getElementById('output-section').style.display = 'none';
  document.getElementById('error-box').style.display = 'none';
  ficheText = ''; mailsText = '';
  switchTab('fiche');
  window.scrollTo(0, 0);
}

function showError(msg) {
  const box = document.getElementById('error-box');
  box.textContent = msg;
  box.style.display = 'block';
}

async function generate() {
  const input = document.getElementById('tmt-input').value.trim();
  if (!input) { showError('Veuillez coller le contenu du TMT avant de générer.'); return; }

  const btn = document.getElementById('gen-btn');
  const spinner = document.getElementById('spinner');
  const label = document.getElementById('btn-label');
  const hint = document.getElementById('hint-text');

  btn.disabled = true;
  spinner.style.display = 'block';
  label.textContent = 'Génération en cours...';
  hint.textContent = 'Cela peut prendre 30 à 60 secondes selon la taille du dossier.';
  document.getElementById('error-box').style.display = 'none';
  document.getElementById('output-section').style.display = 'none';

  try {
    const payload = SYSTEM_PROMPT + '\n\n===TMT===\n\n' + input;

    const res = await fetch(MAKE_WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: payload
    });

    if (!res.ok) {
      showError('Erreur Make : ' + res.status + '. Vérifiez que le scénario Make est bien actif.');
      return;
    }

    const fullText = await res.text();

    if (!fullText || fullText.length < 50) {
      showError('Réponse vide. Vérifiez que le scénario Make est actif et que la connexion Anthropic est configurée.');
      return;
    }

    const marker = '===OUTPUT2===';
    const idx = fullText.indexOf(marker);
    ficheText = idx !== -1 ? fullText.substring(0, idx).trim() : fullText.trim();
    mailsText = idx !== -1 ? fullText.substring(idx + marker.length).trim() : '';

    document.getElementById('fiche-content').textContent = ficheText;

    const refMatch = ficheText.match(/Référence KT\s*:\s*([^\n]+)/);
    if (refMatch) document.getElementById('ref-badge').textContent = refMatch[1].trim();

    const mailsContainer = document.getElementById('mails-content');
    mailsContainer.innerHTML = '';
    let mailCount = 0;

    if (mailsText) {
      const blocks = mailsText.split('---MAIL---').map(b => b.trim()).filter(b => b.length > 10);
      mailCount = blocks.length;
      blocks.forEach((block, i) => {
        const lines = block.split('\n');
        let service = '', jour = '', dest = '', bodyLines = [];
        let inBody = false;
        lines.forEach(l => {
          if (!inBody) {
            if (l.startsWith('SERVICE :')) service = l.replace('SERVICE :', '').trim();
            else if (l.startsWith('JOUR :')) jour = l.replace('JOUR :', '').trim();
            else if (l.startsWith('DESTINATAIRE :')) { dest = l.replace('DESTINATAIRE :', '').trim(); inBody = true; }
          } else { bodyLines.push(l); }
        });
        const body = bodyLines.join('\n').trim();
        const div = document.createElement('div');
        div.className = 'mail-block';
        div.innerHTML = `<div class="mail-block-header"><div class="mail-number">${i+1}</div><div class="mail-meta"><div class="mail-meta-service">${service || 'Service ' + (i+1)}</div><div class="mail-meta-dest">${jour}${dest ? ' · ' + dest : ''}</div></div></div><div class="mail-body">${body.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>`;
        mailsContainer.appendChild(div);
      });
    } else {
      mailsContainer.innerHTML = '<p style="font-size:13px;color:#888780;padding:8px 0;">Aucun mail à générer pour ce dossier.</p>';
    }

    document.getElementById('mail-count').textContent = mailCount;
    document.getElementById('output-section').style.display = 'block';
    switchTab('fiche');
    document.getElementById('output-section').scrollIntoView({ behavior: 'smooth', block: 'start' });

  } catch(e) {
    showError('Erreur réseau : ' + e.message);
  } finally {
    btn.disabled = false;
    spinner.style.display = 'none';
    label.textContent = 'Générer la fiche et les mails';
    hint.textContent = '';
  }
}

function copyTab(tab) {
  const text = tab === 'fiche' ? ficheText : mailsText;
  const btnId = tab === 'fiche' ? 'copy-fiche' : 'copy-mails';
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById(btnId);
    btn.textContent = 'Copié';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = tab === 'mails' ? 'Copier tout' : 'Copier'; btn.classList.remove('copied'); }, 2000);
  });
}
</script>
</body>
</html>
